*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#07090d;font-family:'Heebo',Arial,sans-serif;direction:rtl;color:#e8e8e8;max-width:500px;margin:0 auto;min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#d4af37}

.setup-logo{font-size:52px;margin-bottom:10px}
.setup-title{font-family:'Bebas Neue',sans-serif;font-size:36px;color:#d4af37;letter-spacing:4px;margin-bottom:6px}
.setup-sub{color:#6b7280;font-size:13px;line-height:1.7;margin-bottom:22px}
.setup-step{background:#0a0d14;border-radius:12px;padding:14px;margin-bottom:12px;text-align:right}

#app{display:none;flex-direction:column;min-height:100vh}

.logo{font-family:'Bebas Neue',sans-serif;font-size:26px;color:#d4af37;letter-spacing:4px;line-height:1}
.logo-sub{font-size:9px;color:#5a6070;letter-spacing:2px;margin-top:2px}
.hdr-right{display:flex;gap:8px;align-items:center}
.live-badge{background:#ff1744;color:#fff;font-size:10px;font-weight:800;padding:4px 10px;border-radius:4px;letter-spacing:1px;animation:pulse 2s infinite}
.live-count{background:#ff174420;color:#ff1744;font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;border:1px solid #ff174440;display:none}
.refresh-btn{background:#111827;border:1px solid #1e2940;color:#d4af37;padding:7px 12px;border-radius:10px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:'Heebo',Arial,sans-serif}
.refresh-btn:disabled{opacity:.5}
